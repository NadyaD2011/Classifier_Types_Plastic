<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Классификатор типа пластика</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">AI Классификатор пластика</h1>
        <p class="text-center text-gray-500 text-sm mb-6">Загрузите фото, чтобы определить тип материала</p>

        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="file_input">
                Выберите изображение
            </label>
            <input type="file" id="file_input" accept="image/*" class="block w-full text-sm text-gray-500
              file:mr-4 file:py-2 file:px-4
              file:rounded-full file:border-0
              file:text-sm file:font-semibold
              file:bg-blue-50 file:text-blue-700
              hover:file:bg-blue-100 cursor-pointer border border-gray-300 rounded-lg"/>
        </div>

        <div id="preview_container" class="hidden mb-6 text-center">
            <img id="image_preview" class="mx-auto rounded-lg shadow-md max-h-64 object-contain border border-gray-200" />
        </div>

        <button id="predict_btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg focus:outline-none focus:shadow-outline transition duration-150 ease-in-out disabled:opacity-50 disabled:cursor-not-allowed">
            Определить тип пластика
        </button>

        <div id="loading" class="hidden mt-6 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
            <p class="text-gray-600 mt-2 text-sm">Нейросеть анализирует изображение...</p>
        </div>

        <div id="result_container" class="hidden mt-6 p-4 bg-green-50 border border-green-200 rounded-lg">
            <h2 class="text-sm font-semibold text-green-800 uppercase tracking-wide">Результат анализа:</h2>
            <p class="text-3xl font-bold text-green-900 mt-1" id="result_class"></p>
            <p class="text-sm text-green-700 mt-1" id="result_confidence"></p>
        </div>
        
        <div id="error_container" class="hidden mt-6 p-4 bg-red-50 border border-red-200 rounded-lg">
            <p class="text-sm text-red-700" id="error_message"></p>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file_input');
        const previewContainer = document.getElementById('preview_container');
        const imagePreview = document.getElementById('image_preview');
        const predictBtn = document.getElementById('predict_btn');
        const resultContainer = document.getElementById('result_container');
        const resultClass = document.getElementById('result_class');
        const resultConfidence = document.getElementById('result_confidence');
        const loading = document.getElementById('loading');
        const errorContainer = document.getElementById('error_container');
        const errorMessage = document.getElementById('error_message');

        let selectedFile = null;

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    previewContainer.classList.remove('hidden');
                    resultContainer.classList.add('hidden');
                    errorContainer.classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        predictBtn.addEventListener('click', async function() {
            if (!selectedFile) {
                alert('Пожалуйста, сначала выберите изображение');
                return;
            }

            const formData = new FormData();
            formData.append('file', selectedFile);

            predictBtn.disabled = true;
            loading.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            errorContainer.classList.add('hidden');

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    errorMessage.textContent = data.error;
                    errorContainer.classList.remove('hidden');
                } else {
                    resultClass.textContent = data.class;
                    resultConfidence.textContent = `Уверенность модели: ${(data.confidence * 100).toFixed(2)}%`;
                    resultContainer.classList.remove('hidden');
                }
            } catch (error) {
                errorMessage.textContent = 'Ошибка соединения с сервером. Проверьте, запущен ли app.py';
                errorContainer.classList.remove('hidden');
            } finally {
                predictBtn.disabled = false;
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
